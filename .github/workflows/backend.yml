name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 2
          done

      - name: Set env
        run: |
          echo "DATABASE_URL=postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/app" >> $GITHUB_ENV
          echo "SECRET_KEY=ci-secret" >> $GITHUB_ENV

      - name: Run basic checks
        run: |
          python -c "import sys; print('Python', sys.version)"
          python -c "import importlib; importlib.import_module('fastapi'); importlib.import_module('sqlalchemy'); print('Deps OK')"

      - name: Lint (basic)
        run: |
          python - <<'PY'
          import os, sys
          from pathlib import Path
          bad = []
          for p in Path('backend').rglob('*.py'):
              s = p.read_text(encoding='utf-8', errors='ignore')
              if '\t' in s:
                  bad.append(str(p))
          if bad:
              print('Tabs found in:', *bad, sep='\n')
              sys.exit(1)
          print('Lint OK')
          PY
